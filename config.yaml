app:
  author: Nexuzy Tech
  name: Nexuzy Data Collector
  version: 1.3.0
crawler:
  delay_between_requests: 1.5
  max_pages_per_domain: 100
  max_retries: 3
  timeout: 30
  user_agent: NexuzyDataCollector/1.3 (Educational; India Tourism Research; contact@nexuzy.in)
database:
  path: data/nexuzy_travel.db
export:
  output_dir: export
model:
  cache_dir: models/hf_cache
  hf_model: TinyLlama/TinyLlama-1.1B-Chat-v1.0
  n_ctx: 4096
  n_threads: 4
  path: models/TinyLlama--TinyLlama-1.1B-Chat-v1.0
  temperature: 0.1
open_data:
  ai4bharat:
    api_base: https://inference.ai4bharat.org/api/v2
    api_key: YOUR_AI4BHARAT_KEY
    endpoints:
      asr: /asr
      translate: /translate
      transliterate: /transliterate
    supported_languages:
    - hi
    - bn
    - ta
    - te
    - mr
    - gu
    - kn
    - ml
    - or
    - pa
  data_gov_in:
    api_base: https://api.data.gov.in/resource
    api_key: YOUR_API_KEY
    datasets:
      heritage_sites: e2c7a3a1-1f42-4a8f-8b3c-9d6e5f7a2b1d
      hotels: 1ee62cdf-7a39-4e33-a84c-04bfbf6eac37
      monuments: a3f1b2c4-5d6e-7f8a-9b0c-1d2e3f4a5b6c
      restaurants: f4e3d2c1-b0a9-8f7e-6d5c-4b3a2e1f0d9c
